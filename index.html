<!DOCTYPE html>
<html>
<head>
<title>ZERO STORE A1T</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial; background:#0a0a0a; color:white; margin:0; padding:0; padding-bottom:70px}
.topbar{display:flex; justify-content:space-between; align-items:center; padding:12px 15px; background:#111}
.topbar img{height:35px}
.banner img{width:100%; border-radius:0}
.menu{display:flex; justify-content:space-around; padding:15px 0; background:#111; margin:10px}
.menu-item{text-align:center; font-size:12px}
.menu-item div{width:50px; height:50px; background:#222; border-radius:50%; margin:auto; display:flex; align-items:center; justify-content:center; font-size:22px; margin-bottom:5px}
h2{padding:0 15px; font-size:18px}
.games{display:grid; grid-template-columns: repeat(3,1fr); gap:15px; padding:15px}
.game{text-align:center; font-size:12px}
.game img{width:100%; border-radius:12px; aspect-ratio:1/1}
.bottom-nav{position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; padding:10px 0; border-top:1px solid #333}
.nav-item{text-align:center; font-size:10px; color:#aaa}
</style>
</head>
<body>

<div class="topbar">
<img src="https://img.icons8.com/ios-filled/50/ffffff/menu.png" width="25">
<b style="color:#00ff88; font-size:18px">A1T STORE</b>
<img src="https://img.icons8.com/ios-filled/50/ffffff/user.png" width="25">
</div>

<div class="banner">
<img src="https://via.placeholder.com/600x200/ff0040/ffffff?text=A1T+STORE+OFFICIAL">
</div>

<div class="menu">
<div class="menu-item"><div>+</div>Add Money</div>
<div class="menu-item"><div>👥</div>Follow Us</div>
<div class="menu-item"><div>🔔</div>Notification</div>
<div class="menu-item"><div>🎁</div>Refer</div>
</div>

<h2>Popular Games</h2>
<div class="games">
  <div class="game" onclick="openCompare('Free Fire')"><img src="https://img.icons8.com/color/96/free-fire.png"><p>Free Fire</p></div>
  <div class="game" onclick="openCompare('MLBB')"><img src="https://img.icons8.com/color/96/mobile-legends.png"><p>MLBB</p></div>
  <div class="game" onclick="openCompare('PUBG')"><img src="https://img.icons8.com/color/96/pubg.png"><p>PUBG Mobile</p></div>
  <div class="game" onclick="openCompare('BGMI')"><img src="https://img.icons8.com/color/96/crown.png"><p>BGMI</p></div>
  <div class="game" onclick="openCompare('Genshin')"><img src="https://img.icons8.com/color/96/wind.png"><p>Genshin</p></div>
  <div class="game" onclick="openCompare('CODM')"><img src="https://img.icons8.com/color/96/gun.png"><p>COD Mobile</p></div>
</div>

<div id="comparePage" style="display:none; padding:20px">
<h2 id="gameTitle"></h2>
<table style="width:100%; color:white">
<tr style="background:#ff0040"><th>Website</th><th>Price</th><th></th></tr>
<tr><td>GameKharido</td><td>₹119</td><td><button onclick="goAffiliate('gk')" style="background:#00ff88; border:none; padding:8px; border-radius:5px">Buy</button></td></tr>
<tr><td>Codashop</td><td>₹125</td><td><button onclick="goAffiliate('coda')" style="background:#00ff88; border:none; padding:8px; border-radius:5px">Buy</button></td></tr>
</table>
<button onclick="goHome()" style="margin-top:15px; background:#555; color:white; border:none; padding:10px; width:100%">← Back</button>
</div>

<div class="bottom-nav">
<div class="nav-item">🏠<br>Home</div>
<div class="nav-item">📦<br>Orders</div>
<div class="nav-item">💬<br>Support</div>
<div class="nav-item">⚙️<br>Settings</div>
</div>

<script>
function openCompare(game){
  document.querySelector('.games').style.display='none';
  document.querySelector('h2').style.display='none';
  document.getElementById("comparePage").style.display = "block";
  document.getElementById("gameTitle").innerText = game + " Price Comparison";
}
function goHome(){
  document.querySelector('.games').style.display='grid';
  document.querySelector('h2').style.display='block';
  document.getElementById("comparePage").style.display = "none";
}
function goAffiliate(site){
  if(site=='gk') window.open('https://www.gamekharido.com');
  if(site=='coda') window.open('https://www.codashop.com');
}
</script>

</body>
</html>
